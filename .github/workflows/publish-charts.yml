name: Publish Helm Charts to ACR

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  CHARTS_DIR: charts
  HELM_VERSION: v3.14.0

jobs:
  publish-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Add Helm repositories
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: |
          az acr login --name ${{ secrets.ACR_NAME }}

      - name: Package and publish Helm charts
        run: |
          for chart in $(find ${{ env.CHARTS_DIR }} -mindepth 1 -maxdepth 1 -type d); do
            chart_name=$(basename $chart)
            echo "Processing chart: $chart_name"
            
            # Update dependencies if Chart.yaml has dependencies
            if grep -q "^dependencies:" "$chart/Chart.yaml" 2>/dev/null; then
              echo "Updating dependencies for $chart_name"
              helm dependency update $chart
            fi
            
            # Package the chart
            helm package $chart --destination ./packaged-charts
            
            # Get the chart version from Chart.yaml
            chart_version=$(helm show chart $chart | grep '^version:' | awk '{print $2}')
            
            # Push to ACR (OCI format)
            helm push ./packaged-charts/${chart_name}-${chart_version}.tgz oci://${{ secrets.ACR_NAME }}.azurecr.io/helm
            
            echo "Successfully published ${chart_name} version ${chart_version}"
          done

      - name: Verify published charts
        run: |
          echo "Published charts can be accessed at:"
          for chart in $(find ${{ env.CHARTS_DIR }} -mindepth 1 -maxdepth 1 -type d); do
            chart_name=$(basename $chart)
            chart_version=$(helm show chart $chart | grep '^version:' | awk '{print $2}')
            echo "  - oci://${{ secrets.ACR_NAME }}.azurecr.io/helm/${chart_name}:${chart_version}"
          done
