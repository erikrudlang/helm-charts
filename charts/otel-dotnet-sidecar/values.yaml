
# OpenTelemetry Collector configuration
otelCollector:
  # Name of the collector instance
  name: sidecar
  # Mode: deployment, daemonset, statefulset, or sidecar
  mode: sidecar
  # image: otel/opentelemetry-collector-contrib:0.98.0
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # OpenTelemetry Collector configuration
  config: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    
    processors:
      batch:
        timeout: 10s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
    
    exporters:
      # Configure your exporters here
      logging:
        loglevel: info
      # Example: Azure Monitor exporter
      # azuremonitor:
      #   connection_string: "${APPLICATIONINSIGHTS_CONNECTION_STRING}"
      # Example: OTLP exporter to backend
      # otlp:
      #   endpoint: "your-backend:4317"
      #   tls:
      #     insecure: true
    
    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [logging]

# .NET auto-instrumentation configuration
instrumentation:
  enabled: true
  # Instrumentation resource name
  name: dotnet-instrumentation
  # Exporter endpoint (will be overridden by sidecar injection)
  exporter:
    endpoint: http://localhost:4318
  # .NET specific configuration
  dotnet:
    # image: ghcr.io/open-telemetry/opentelemetry-dotnet-instrumentation/autoinstrumentation-dotnet:1.3.0
    # Environment variables for .NET instrumentation
    # env:
    #   OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    #   OTEL_DOTNET_AUTO_TRACES_ENABLED: "true"
    #   OTEL_DOTNET_AUTO_METRICS_ENABLED: "true"
    #   OTEL_DOTNET_AUTO_LOGS_ENABLED: "true"
    #   # Instrumentation for common libraries
    #   OTEL_DOTNET_AUTO_TRACES_ASPNETCORE_INSTRUMENTATION_ENABLED: "true"
    #   OTEL_DOTNET_AUTO_TRACES_HTTPCLIENT_INSTRUMENTATION_ENABLED: "true"
    #   OTEL_DOTNET_AUTO_TRACES_SQLCLIENT_INSTRUMENTATION_ENABLED: "true"
  # Resource attributes
  resource:
    addK8sUIDAttributes: true
  # Propagators
  propagators:
    - tracecontext
    - baggage
  # Sampler configuration
  sampler:
    type: parentbased_traceidratio
    argument: "1.0"

