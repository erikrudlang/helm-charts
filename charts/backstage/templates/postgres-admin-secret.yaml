{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: postgres-admin-secret
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.administratorPassword | quote }}
{{- end }}
