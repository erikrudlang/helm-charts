{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: backstage-postgres-connection
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_HOST: {{ include "backstage.postgresql.fqdn" . }}
  POSTGRES_PORT: "5432"
  POSTGRES_USER: {{ .Values.postgresql.administratorLogin }}
  POSTGRES_PASSWORD: {{ .Values.postgresql.administratorPassword | quote }}
  POSTGRES_DB: postgres
  POSTGRES_CONNECTION_STRING: postgresql://{{ .Values.postgresql.administratorLogin }}:{{ .Values.postgresql.administratorPassword }}@{{ include "backstage.postgresql.fqdn" . }}:5432/postgres?sslmode=require
{{- end }}
