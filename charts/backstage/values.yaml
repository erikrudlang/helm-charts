replicaCount: 1

image:
  repository: acraksdemo.azurecr.io/backstage
  tag: latest
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: backstage
  labels:
    name: backstage
    environment: production

service:
  type: ClusterIP
  port: 80
  targetPort: 7007

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Azure Resource Group
azure:
  resourceGroup:
    enabled: true
    name: backstage-rg
    location: northeurope
    tags:
      environment: production
      application: backstage
      managed-by: azure-service-operator

# PostgreSQL Configuration
postgresql:
  enabled: true
  serverName: erudlang-backstage-postgres
  location: northeurope
  sku:
    name: Standard_B1ms
    tier: Burstable
  version: "14"
  administratorLogin: backstageadmin
  administratorPassword: "ChangeMe123!@#"  # Change in production
  storage:
    storageSizeGB: 32
  backup:
    backupRetentionDays: 7
    geoRedundantBackup: Disabled
  highAvailability:
    mode: Disabled
  network:
    publicNetworkAccess: Enabled
  database:
    name: backstage-db
    charset: UTF8
    collation: en_US.utf8
  firewall:
    allowAzureServices: true

# GitHub App Credentials (base64 encoded)
github:
  appId: "MzU4NDM1Ng=="
  clientId: "SXYyM2xpWnBNU2tRdEhPWjYyYU8="
  clientSecret: "NzIwNTJmNmIxODJiNzhkMThjYTA0ZTZmZDFhNjlhNmUxZWY0ZGIxYg=="
  privateKey: ""
  webhookSecret: "NzUxOWU5MjljZmIwOTY4MWQyOTk2OWI1OWE3YTA0MjY2N2I0NDlmMw=="

# Common labels for ArgoCD integration
commonLabels:
  app.kubernetes.io/name: backstage
  app.kubernetes.io/managed-by: argocd
