# CloudNativePG cluster configuration
cluster:
  name: "postgres-cluster"
  instances: 1
  imageName: "ghcr.io/cloudnative-pg/postgresql:16.2"
  
  storage:
    size: "10Gi"
    storageClass: ""
  
  bootstrap:
    initdb:
      database: "app"
      owner: "app"
      secret:
        name: ""
  
  monitoring:
    enabled: false
  
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
