{{- if .Values.azureKeyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "azure-microservice.fullname" . }}-keyvault
  labels:
    {{- include "azure-microservice.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    {{- if .Values.workloadIdentity.enabled }}
    clientID: "{{ "{{" }} index (lookup "v1" "ConfigMap" .Release.Namespace (printf "%s-identity" (include "azure-microservice.fullname" .))) "data" "AZURE_CLIENT_ID" | default "" {{ "}}" }}"
    {{- else }}
    clientID: ""
    {{- end }}
    keyvaultName: {{ .Values.azureKeyVault.keyVaultName | default .Values.azureKeyVault.vaultName | default (include "azure-microservice.fullname" .) }}
    cloudName: ""
    objects: |
      array:
        {{- range .Values.azureKeyVault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
          objectAlias: {{ .secretName }}
        {{- end }}
    tenantId: {{ .Values.azureKeyVault.tenantId }}
{{- end }}
