{{- if .Values.azureKeyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "azure-microservice.fullname" . }}-keyvault
  labels:
    {{- include "azure-microservice.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: ""  # Set via workload identity
    keyvaultName: {{ .Values.azureKeyVault.keyVaultName }}
    cloudName: ""
    objects: |
      array:
        {{- range .Values.azureKeyVault.secrets }}
        - |
          objectName: {{ .objectName }}
          objectType: {{ .objectType }}
          objectAlias: {{ .secretName }}
        {{- end }}
    tenantId: {{ .Values.azureKeyVault.tenantId }}
{{- end }}
