{{- if .Values.workloadIdentity.enabled }}
apiVersion: managedidentity.azure.com/v1api20230131
kind: FederatedIdentityCredential
metadata:
  name: {{ include "azure-microservice.fullname" . }}-federated-credential
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "azure-microservice.labels" . | nindent 4 }}
spec:
  owner:
    name: {{ .Values.workloadIdentity.identityName | default (include "azure-microservice.fullname" .) }}
  audiences:
    - api://AzureADTokenExchange
  issuer: {{ .Values.workloadIdentity.oidcIssuerUrl | required "workloadIdentity.oidcIssuerUrl is required when workloadIdentity.enabled is true" }}
  subject: system:serviceaccount:{{ .Values.workloadIdentity.serviceAccountNamespace | default .Release.Namespace }}:{{ .Values.workloadIdentity.serviceAccountName | default (include "azure-microservice.serviceAccountName" .) }}
{{- end }}
