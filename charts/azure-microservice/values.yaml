# Default values for azure-microservice
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas for the microservice
replicaCount: 2

# Container image configuration
image:
  repository: myacr.azurecr.io/myapp
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  # Azure Workload Identity annotation (automatically set if workloadIdentity.enabled is true)
  # azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  name: ""

# Azure Workload Identity configuration
workloadIdentity:
  enabled: false
  # Resource group where the managed identity will be created
  resourceGroup: ""
  # Azure location
  location: "northeurope"
  # Name of the managed identity (defaults to release name if not set)
  identityName: ""
  # AKS OIDC issuer URL (required for federated credentials)
  # Get with: az aks show -n <cluster-name> -g <rg> --query "oidcIssuerProfile.issuerUrl" -o tsv
  oidcIssuerUrl: ""
  # Service account namespace (defaults to release namespace)
  serviceAccountNamespace: ""
  # Service account name (defaults to the service account created by this chart)
  serviceAccountName: ""
  # Tags for the managed identity
  tags:
    managed-by: "helm"
    application: "microservice"

# Pod annotations (useful for Azure integrations)
podAnnotations: {}
  # azure.workload.identity/use: "true"

podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}
  # Enable for Azure Load Balancer
  # service.beta.kubernetes.io/azure-load-balancer-internal: "true"

# Ingress configuration for Azure Application Gateway or NGINX
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: myapp-tls
  #    hosts:
  #      - myapp.example.com

# Resource requests and limits
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Health check probes
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/startup
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Environment variables
env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
  - name: PORT
    value: "8080"

# Environment variables from ConfigMap
envFrom: []
  # - configMapRef:
  #     name: app-config
  # - secretRef:
  #     name: app-secrets

# ConfigMap data
configMap:
  enabled: false
  data: {}
    # APP_NAME: "my-microservice"
    # LOG_LEVEL: "info"

# Azure Key Vault integration using CSI driver
azureKeyVault:
  enabled: false
  # Create a new Key Vault resource (requires Azure Service Operator)
  create: false
  # Name of the Key Vault (defaults to release name if not set)
  vaultName: ""
  # Resource group for the Key Vault (defaults to workloadIdentity.resourceGroup if not set)
  resourceGroup: ""
  # Azure location (defaults to workloadIdentity.location if not set)
  location: ""
  # Azure tenant ID
  tenantId: ""
  # Name of existing Key Vault to use (when create is false)
  keyVaultName: ""
  # Key Vault SKU (standard or premium)
  sku: "standard"
  # Use RBAC authorization instead of access policies (recommended)
  enableRbacAuthorization: true
  # Access policies (only used when enableRbacAuthorization is false)
  accessPolicies: []
    # - tenantId: "00000000-0000-0000-0000-000000000000"
    #   objectId: "00000000-0000-0000-0000-000000000000"
    #   permissions:
    #     secrets:
    #       - get
    #       - list
  # Enable for deployment scenarios
  enabledForDeployment: false
  enabledForDiskEncryption: false
  enabledForTemplateDeployment: false
  # Soft delete configuration
  enableSoftDelete: true
  softDeleteRetentionInDays: 90
  # Purge protection (cannot be disabled once enabled)
  enablePurgeProtection: false
  # Network ACLs
  networkAcls: {}
    # bypass: "AzureServices"
    # defaultAction: "Deny"
    # ipRules:
    #   - value: "1.2.3.4/32"
    # virtualNetworkRules:
    #   - id: "/subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Network/virtualNetworks/{vnet}/subnets/{subnet}"
  # Tags for the Key Vault
  tags:
    managed-by: "helm"
  # Secrets to mount from Key Vault via CSI driver
  secrets: []
    # - secretName: "database-password"
    #   objectName: "db-password"
    #   objectType: "secret"
    # - secretName: "api-key"
    #   objectName: "external-api-key"
    #   objectType: "secret"

# Azure Service Bus integration
azureServiceBus:
  enabled: false
  # Create a new Service Bus namespace (requires Azure Service Operator)
  create: false
  # Name of the Service Bus namespace (defaults to release name if not set)
  namespaceName: ""
  # Resource group for the Service Bus (defaults to workloadIdentity.resourceGroup if not set)
  resourceGroup: ""
  # Azure location (defaults to workloadIdentity.location if not set)
  location: ""
  # Service Bus SKU (Basic, Standard, or Premium)
  sku: "Standard"
  # Capacity for Premium SKU (1, 2, 4, 8, or 16 messaging units)
  capacity: 1
  # Zone redundancy (Premium SKU only)
  zoneRedundant: false
  # Disable local authentication (requires Azure AD authentication only)
  disableLocalAuth: true
  # Minimum TLS version (1.0, 1.1, or 1.2)
  minimumTlsVersion: "1.2"
  # Public network access (Enabled, Disabled, or SecuredByPerimeter)
  publicNetworkAccess: "Enabled"
  # Tags for the Service Bus namespace
  tags:
    managed-by: "helm"
  # Queues to create
  queues: []
    # - name: "orders-queue"
    #   maxDeliveryCount: 10
    #   lockDuration: "PT1M"  # ISO 8601 duration (PT1M = 1 minute)
    #   maxSizeInMegabytes: 1024
    #   requiresDuplicateDetection: false
    #   requiresSession: false
    #   defaultMessageTimeToLive: "P14D"  # ISO 8601 duration (P14D = 14 days)
    #   deadLetteringOnMessageExpiration: true
    #   enableBatchedOperations: true
    #   enablePartitioning: false
    #   enableExpress: false
  # Topics to create
  topics: []
    # - name: "events-topic"
    #   maxSizeInMegabytes: 1024
    #   requiresDuplicateDetection: false
    #   defaultMessageTimeToLive: "P14D"
    #   enableBatchedOperations: true
    #   enablePartitioning: false
    #   supportOrdering: false
    #   enableExpress: false
    #   subscriptions:
    #     - name: "processor-sub"
    #       maxDeliveryCount: 10
    #       lockDuration: "PT1M"
    #       requiresSession: false
    #       defaultMessageTimeToLive: "P14D"
    #       deadLetteringOnMessageExpiration: true
    #       deadLetteringOnFilterEvaluationExceptions: true
    #       enableBatchedOperations: true

# Azure App Configuration
azureAppConfiguration:
  enabled: false
  # Create a new App Configuration store (requires Azure Service Operator)
  create: false
  # Name of the App Configuration store (defaults to release name if not set)
  storeName: ""
  # Resource group for the App Configuration (defaults to workloadIdentity.resourceGroup if not set)
  resourceGroup: ""
  # Azure location (defaults to workloadIdentity.location if not set)
  location: ""
  # Name of existing App Configuration store to use (when create is false)
  configStoreName: ""
  # App Configuration SKU (free or standard)
  sku: "standard"
  # Public network access (Enabled or Disabled)
  publicNetworkAccess: "Enabled"
  # Disable local authentication (requires Azure AD authentication only)
  disableLocalAuth: true
  # Enable purge protection (cannot be disabled once enabled)
  enablePurgeProtection: false
  # Soft delete retention period in days (1-7)
  softDeleteRetentionInDays: 7
  # Tags for the App Configuration store
  tags:
    managed-by: "helm"

# Azure Redis Cache integration
azureRedis:
  enabled: false
  cacheName: ""
  sku:
    name: "Basic"
    family: "C"
    capacity: 0

# Azure Storage Account integration
azureStorage:
  enabled: false
  accountName: ""
  containers: []
    # - name: "uploads"
    #   publicAccess: "None"
    # - name: "assets"
    #   publicAccess: "Blob"

# Azure Application Insights
azureApplicationInsights:
  enabled: false
  instrumentationKey: ""
  connectionString: ""

# Additional volumes
volumes: []
  # - name: temp
  #   emptyDir: {}
  # - name: cache
  #   emptyDir:
  #     sizeLimit: 1Gi

# Additional volume mounts
volumeMounts: []
  # - name: temp
  #   mountPath: /tmp
  # - name: cache
  #   mountPath: /app/cache

# Node selector for pod placement
nodeSelector: {}
  # kubernetes.io/os: linux
  # agentpool: userpool

# Tolerations for pod scheduling
tolerations: []

# Affinity rules
affinity: {}
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #   - weight: 100
  #     podAffinityTerm:
  #       labelSelector:
  #         matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - myapp
  #       topologyKey: kubernetes.io/hostname

# Azure Monitor / Prometheus metrics
metrics:
  enabled: false
  port: 9090
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
