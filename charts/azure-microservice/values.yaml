# Default values for azure-microservice
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Number of replicas for the microservice
replicaCount: 2

# Container image configuration
image:
  repository: myacr.azurecr.io/myapp
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# ServiceAccount configuration
serviceAccount:
  create: true
  automount: true
  annotations: {}
  # Azure Workload Identity annotation (automatically set if workloadIdentity.enabled is true)
  # azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
  name: ""

# Azure Workload Identity configuration
workloadIdentity:
  enabled: false
  # Resource group where the managed identity will be created
  resourceGroup: ""
  # Azure location
  location: "northeurope"
  # Name of the managed identity (defaults to release name if not set)
  identityName: ""
  # AKS OIDC issuer URL (required for federated credentials)
  # Get with: az aks show -n <cluster-name> -g <rg> --query "oidcIssuerProfile.issuerUrl" -o tsv
  oidcIssuerUrl: ""
  # Service account namespace (defaults to release namespace)
  serviceAccountNamespace: ""
  # Service account name (defaults to the service account created by this chart)
  serviceAccountName: ""
  # Tags for the managed identity
  tags:
    managed-by: "helm"
    application: "microservice"

# Pod annotations (useful for Azure integrations)
podAnnotations: {}
  # azure.workload.identity/use: "true"

podLabels: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}
  # Enable for Azure Load Balancer
  # service.beta.kubernetes.io/azure-load-balancer-internal: "true"

# Ingress configuration for Azure Application Gateway or NGINX
ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: myapp-tls
  #    hosts:
  #      - myapp.example.com

# Resource requests and limits
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Health check probes
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/startup
    port: http
  initialDelaySeconds: 0
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 30

# Horizontal Pod Autoscaler
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Environment variables
env:
  - name: ASPNETCORE_ENVIRONMENT
    value: "Production"
  - name: PORT
    value: "8080"

# Environment variables from ConfigMap
envFrom: []
  # - configMapRef:
  #     name: app-config
  # - secretRef:
  #     name: app-secrets

# ConfigMap data
configMap:
  enabled: false
  data: {}
    # APP_NAME: "my-microservice"
    # LOG_LEVEL: "info"

# Azure Key Vault integration using CSI driver
azureKeyVault:
  enabled: false
  tenantId: ""
  keyVaultName: ""
  # Secrets to mount from Key Vault
  secrets: []
    # - secretName: "database-password"
    #   objectName: "db-password"
    #   objectType: "secret"
    # - secretName: "api-key"
    #   objectName: "external-api-key"
    #   objectType: "secret"

# Azure Service Bus integration
azureServiceBus:
  enabled: false
  namespaceName: ""
  # Queues to create
  queues: []
    # - name: "orders-queue"
    #   maxDeliveryCount: 10
    # - name: "notifications-queue"
    #   maxDeliveryCount: 5
  # Topics to create
  topics: []
    # - name: "events-topic"
    #   subscriptions:
    #     - name: "processor-sub"
    #       maxDeliveryCount: 10

# Azure Redis Cache integration
azureRedis:
  enabled: false
  cacheName: ""
  sku:
    name: "Basic"
    family: "C"
    capacity: 0

# Azure Storage Account integration
azureStorage:
  enabled: false
  accountName: ""
  containers: []
    # - name: "uploads"
    #   publicAccess: "None"
    # - name: "assets"
    #   publicAccess: "Blob"

# Azure Application Insights
azureApplicationInsights:
  enabled: false
  instrumentationKey: ""
  connectionString: ""

# Additional volumes
volumes: []
  # - name: temp
  #   emptyDir: {}
  # - name: cache
  #   emptyDir:
  #     sizeLimit: 1Gi

# Additional volume mounts
volumeMounts: []
  # - name: temp
  #   mountPath: /tmp
  # - name: cache
  #   mountPath: /app/cache

# Node selector for pod placement
nodeSelector: {}
  # kubernetes.io/os: linux
  # agentpool: userpool

# Tolerations for pod scheduling
tolerations: []

# Affinity rules
affinity: {}
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #   - weight: 100
  #     podAffinityTerm:
  #       labelSelector:
  #         matchExpressions:
  #         - key: app
  #           operator: In
  #           values:
  #           - myapp
  #       topologyKey: kubernetes.io/hostname

# Azure Monitor / Prometheus metrics
metrics:
  enabled: false
  port: 9090
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: 30s

# Network Policy
networkPolicy:
  enabled: false
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress: []
